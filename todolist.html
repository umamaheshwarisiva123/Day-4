<!DOCTYPE html>
<html>
<head>
    <title>To Do List</title>
    <link rel="stylesheet" href="todolist.css">
</head>
<body>

    <h1>To Do List</h1>
    <input type="text" id="task" placeholder="Enter your task"><br><br>
    <button id="add" onclick="addTask()">Add</button><br><br>
    <button id="delete" onclick="deleteTask()">Delete</button><br><br>
    <button id="total" onclick="totalTask() ">Total</button><br><br>
    <ul id="list"></ul>
    
    <script src="todolist.js"></script>
</body>
</html>
